{% extends "base.html" %}
{% block content %}

<!-- 🔥 GRADIENT HERO SECTION -->
<div class="p-5 mb-4 rounded text-center text-white hero-section">
    <h1 class="fw-bold">🚗 Online Car Auction</h1>
    <p>Buy & Sell Cars with Live Bidding</p>

    <!-- 🔎 SEARCH BAR -->
    <div class="col-md-6 mx-auto mt-3">
        <input type="text" class="form-control form-control-lg"
               placeholder="Search cars...">
    </div>
</div>


<!-- 🎯 FILTER BUTTONS -->
<div class="mb-4 text-center">
    <button class="btn btn-outline-dark me-2">All</button>
    <button class="btn btn-outline-primary me-2">Luxury</button>
    <button class="btn btn-outline-success me-2">SUV</button>
    <button class="btn btn-outline-danger">Sports</button>
</div>


<!-- 🚗 CAR GRID -->
<div class="row">

{% for car in cars %}
<div class="col-md-4 mb-4">

<div class="card border-0 shadow-sm h-100 car-card">

<!-- ⭐ PREMIUM BADGE -->
<span class="badge bg-warning premium-badge">Premium</span>

{% if car.image %}
<img src="{{car.image.url}}" class="card-img-top"
     style="height:220px;object-fit:cover;">
{% else %}
<img src="https://via.placeholder.com/400x200?text=No+Image"
     class="card-img-top">
{% endif %}

<div class="card-body d-flex flex-column">

<h5 class="fw-bold">{{car.title}}</h5>

<p class="text-success fw-semibold">
₹{{car.highest_bid}}
</p>

<a href="/car/{{car.id}}/" class="btn btn-dark mt-auto w-100">
View Auction
</a>

</div>
</div>

</div>
{% endfor %}

</div>


<!-- 🎨 CUSTOM STYLE -->
<style>

.hero-section{
background: linear-gradient(135deg,#1f1c2c,#928dab);
}

.car-card{
transition:0.3s;
position:relative;
}

.car-card:hover{
transform:translateY(-6px);
box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

.premium-badge{
position:absolute;
top:10px;
left:10px;
font-size:12px;
}

</style>

{% endblock %}
