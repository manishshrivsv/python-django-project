<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Car Auction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- BOOTSTRAP ICONS -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

/* 🔥 DARK GLOW NAVBAR */
.glow-navbar{
background:#0f0f0f;
box-shadow:0px 0px 20px rgba(255,193,7,0.2);
}

/* 👤 AVATAR STYLE */
.avatar-circle{
width:35px;
height:35px;
border-radius:50%;
background:#ffc107;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:black;
margin-right:5px;
}

/* 🔔 NOTIFICATION BADGE */
.notify-badge{
position:absolute;
top:-5px;
right:-8px;
font-size:10px;
}

.nav-link:hover{
color:#ffc107 !important;
transition:0.3s;
}

</style>

</head>

<body>

<!-- ⭐ ULTRA NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark glow-navbar sticky-top">
<div class="container">

<a class="navbar-brand fw-bold" href="/">
🚗 CarAuction
</a>

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="nav">

<ul class="navbar-nav align-items-center">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

{% if user.is_authenticated %}

<!-- 🔔 NOTIFICATION -->
<li class="nav-item me-3 position-relative">
<a class="nav-link" href="#">
<i class="bi bi-bell fs-5"></i>
<span class="badge bg-danger rounded-pill notify-badge">3</span>
</a>
</li>

<!-- 👤 PROFILE DROPDOWN -->
<li class="nav-item dropdown">

<a class="nav-link dropdown-toggle d-flex align-items-center"
data-bs-toggle="dropdown">

<div class="avatar-circle">
{{ user.username|slice:":1"|upper }}
</div>

{{user.username}}

</a>

<ul class="dropdown-menu dropdown-menu-end shadow">

<li><a class="dropdown-item" href="/add/">🚗 Sell Car</a></li>
<li><a class="dropdown-item" href="#">👤 Profile</a></li>

<li><hr class="dropdown-divider"></li>

<li><a class="dropdown-item text-danger" href="/logout/">Logout</a></li>

</ul>

</li>

{% else %}

<li class="nav-item">
<a class="nav-link" href="/login/">Login</a>
</li>

<li class="nav-item">
<a class="btn btn-warning ms-2" href="/register/">Register</a>
</li>

{% endif %}

</ul>

</div>
</div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
